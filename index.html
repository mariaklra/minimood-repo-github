<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tastorybite - Link in Bio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="container">
        <header>
            <img src="profil.jpg" alt="Logo Tastorybite" class="profile-img">
            <h1>@tastorybite</h1>
            <p>Foodies & Tasty Stories in Every Bite 🍰</p>
        </header>

        <div class="links">
            <a href="https://wa.me/yournumber" class="link-card">
                <i class="fab fa-whatsapp"></i> Order via WhatsApp
            </a>
            <a href="https://shopee.co.id/yourshop" class="link-card">
                <i class="fas fa-shopping-bag"></i> Shopee Store
            </a>
            <a href="https://instagram.com/tastorybite" class="link-card">
                <i class="fab fa-instagram"></i> Follow Instagram
            </a>
            <a href="https://tiktok.com/@tastorybite" class="link-card">
                <i class="fab fa-tiktok"></i> TikTok Review
            </a>
        </div>

        <footer>
            <p>&copy; 2024 Tastorybite</p>
        </footer>
    </div>

</body>
</html>
